name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2026-04-07

defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            test_extra_args: ""
          - name: macOS x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            test_extra_args: ""
          # krio-fiber's context-switch asm is SysV-ABI (args in
          # rdi/rsi, SysV callee-saved set). Windows x86_64 uses the
          # MS x64 ABI (args in rcx/rdx, different callee-saved set),
          # so the asm compiles via LLVM but would read/write garbage
          # at runtime. Clippy still covers krio-fiber + krio-preempt
          # on Windows; tests skip them until the asm grows an MS x64
          # variant.
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            test_extra_args: "--exclude krio-fiber --exclude krio-preempt"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt --target "${{ matrix.target }}"
          rustup default "$RUST_TOOLCHAIN"

      - name: Show toolchain
        run: rustc -vV

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --target "${{ matrix.target }}" -- -D warnings

      - name: Run tests
        run: cargo test --workspace ${{ matrix.test_extra_args }} --target "${{ matrix.target }}"
