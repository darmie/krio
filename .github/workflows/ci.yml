name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2026-04-07

defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            run_tests: true
          - name: macOS x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            run_tests: true
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            run_tests: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt --target "${{ matrix.target }}"
          rustup default "$RUST_TOOLCHAIN"

      - name: Show toolchain
        run: rustc -vV

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --target "${{ matrix.target }}"

      - name: Run tests
        if: matrix.run_tests
        run: cargo test --workspace --target "${{ matrix.target }}"
